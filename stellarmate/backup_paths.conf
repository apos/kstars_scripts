# StellarMate backup path configuration
# Lines starting with # are comments, blank lines are ignored.
# Use ~ for the user's home directory.

# Core paths (backup aborts if any are missing)
[core]
/etc/hosts
/etc/NetworkManager/system-connections
~/Documents/sequences
~/Documents/scheduler
~/.indi
~/.config/autostart
~/.config/kstars
~/.config/kstarsrc
~/.config/kstars.kmessagebox
~/.config/kstars.notifyrc
~/.local/share/ekoslive
~/.local/share/kstars
~/.ssh

# Optional paths (backed up if present)
[optional]
~/.config/kstarsrc.lock
~/.phd2
~/.ZWO
~/.PHDGuidingV2
~/FireCapture
~/.astropy
~/.java
~/bin
~/.var/app/org.kde.kstars
